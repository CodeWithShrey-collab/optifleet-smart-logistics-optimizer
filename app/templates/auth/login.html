{% extends "base.html" %}

{% block title %}Login | OptiFleet{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 fw-bold mb-2">Welcome back</h1>
            <p class="text-secondary mb-4">Sign in to manage deliveries, fleets, and optimizer runs.</p>
            <form id="loginForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" name="email" type="email" required>
                </div>
                <div class="col-12">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" name="password" type="password" required>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </div>
            </form>
            <p class="mb-0 mt-4 text-secondary">Need an account? <a href="{{ url_for('auth.register_page') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.OptiFleetPage = { formId: "loginForm", endpoint: "{{ url_for('auth.login_action') }}" };
</script>
<script src="{{ url_for('static', filename='js/auth-form.js') }}"></script>
{% endblock %}
