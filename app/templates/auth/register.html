{% extends "base.html" %}

{% block title %}Register | OptiFleet{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 fw-bold mb-2">Create your account</h1>
            <p class="text-secondary mb-4">Set up your workspace and start managing live fleet operations.</p>
            <form id="registerForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label" for="name">Full name</label>
                    <input class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" name="email" type="email" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="role">Role</label>
                    <select class="form-select" id="role" name="role">
                        <option value="operator">Operator</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" name="password" type="password" minlength="8" required>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary w-100" type="submit">Create account</button>
                </div>
            </form>
            <p class="mb-0 mt-4 text-secondary">Already registered? <a href="{{ url_for('auth.login_page') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.OptiFleetPage = { formId: "registerForm", endpoint: "{{ url_for('auth.register_action') }}" };
</script>
<script src="{{ url_for('static', filename='js/auth-form.js') }}"></script>
{% endblock %}
