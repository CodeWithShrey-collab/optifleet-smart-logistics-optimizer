<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OptiFleet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="app-shell">
    <div class="container-fluid">
        <div class="row min-vh-100">
            {% if current_user.is_authenticated %}
            <aside class="col-12 col-lg-2 sidebar py-4 px-3">
                <a class="brand-link" href="{{ url_for('dashboard.dashboard_page') }}">OptiFleet</a>
                <nav class="nav flex-column gap-2 mt-4">
                    <a class="nav-link" href="{{ url_for('dashboard.dashboard_page') }}">Dashboard</a>
                    <a class="nav-link" href="{{ url_for('orders.orders_page') }}">Orders</a>
                    <a class="nav-link" href="{{ url_for('vehicles.vehicles_page') }}">Vehicles</a>
                    <a class="nav-link" href="{{ url_for('warehouses.warehouses_page') }}">Warehouses</a>
                    <a class="nav-link" href="{{ url_for('optimizer.optimizer_page') }}">Optimizer</a>
                    <a class="nav-link" href="{{ url_for('dispatch.dispatch_page') }}">Dispatch Engine</a>
                    <a class="nav-link" href="{{ url_for('network.network_page') }}">Network Planner</a>
                </nav>
                <div class="small text-white-50 mt-4">Signed in as {{ current_user.name }}</div>
                <button class="btn btn-outline-light btn-sm mt-3" id="logoutButton">Logout</button>
            </aside>
            {% endif %}
            <main class="{% if current_user.is_authenticated %}col-12 col-lg-10{% else %}col-12{% endif %} p-4 p-lg-5">
                <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    {% if current_user.is_authenticated %}
    <script>
        window.OptiFleetAuth = { logoutUrl: "{{ url_for('auth.logout_action') }}" };
    </script>
    {% endif %}
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
