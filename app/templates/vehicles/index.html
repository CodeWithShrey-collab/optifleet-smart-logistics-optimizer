{% extends "base.html" %}

{% block title %}Vehicles | OptiFleet{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <div>
        <h1 class="h2 fw-bold mb-1">Vehicles</h1>
        <p class="text-secondary mb-0">Manage truck capacity, status, and live operating locations.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#vehicleFormWrap">New Vehicle</button>
</div>

<div id="vehicleFormWrap" class="collapse show mb-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form id="vehicleForm" class="row g-3">
                <input type="hidden" name="id" id="vehicleId">
                <div class="col-md-4">
                    <label class="form-label">Truck Name</label>
                    <input class="form-control" name="truck_name" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Capacity</label>
                    <input class="form-control" name="capacity" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Current Load</label>
                    <input class="form-control" name="current_load" type="number" min="0" step="0.01" value="0" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        <option value="available">Available</option>
                        <option value="loading">Loading</option>
                        <option value="en_route">En Route</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Location</label>
                    <input class="form-control" name="location" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save Vehicle</button>
                    <button class="btn btn-outline-secondary" type="button" id="vehicleResetButton">Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table align-middle" id="vehiclesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Truck</th>
                        <th>Capacity</th>
                        <th>Current Load</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.OptiFleetVehicles = { baseUrl: "/api/vehicles" };
</script>
<script src="{{ url_for('static', filename='js/vehicles.js') }}"></script>
{% endblock %}
