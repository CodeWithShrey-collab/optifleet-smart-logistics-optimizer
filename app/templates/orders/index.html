{% extends "base.html" %}

{% block title %}Orders | OptiFleet{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <div>
        <h1 class="h2 fw-bold mb-1">Orders</h1>
        <p class="text-secondary mb-0">Create, update, and remove delivery orders without reloading the page.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#orderFormWrap">New Order</button>
</div>

<div id="orderFormWrap" class="collapse show mb-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form id="orderForm" class="row g-3">
                <input type="hidden" name="id" id="orderId">
                <div class="col-md-4">
                    <label class="form-label">Customer Name</label>
                    <input class="form-control" name="customer_name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Package Name</label>
                    <input class="form-control" name="package_name" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Weight</label>
                    <input class="form-control" name="weight" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Profit</label>
                    <input class="form-control" name="profit" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Priority</label>
                    <input class="form-control" name="priority" type="number" min="1" step="1" value="1" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Source</label>
                    <input class="form-control" name="source" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Destination</label>
                    <input class="form-control" name="destination" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Start</label>
                    <input class="form-control" name="delivery_start" type="datetime-local" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">End</label>
                    <input class="form-control" name="delivery_end" type="datetime-local" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        <option value="pending">Pending</option>
                        <option value="scheduled">Scheduled</option>
                        <option value="in_transit">In Transit</option>
                        <option value="delivered">Delivered</option>
                    </select>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save Order</button>
                    <button class="btn btn-outline-secondary" type="button" id="orderResetButton">Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table align-middle" id="ordersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Package</th>
                        <th>Weight</th>
                        <th>Profit</th>
                        <th>Route</th>
                        <th>Window</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.OptiFleetOrders = { baseUrl: "/api/orders" };
</script>
<script src="{{ url_for('static', filename='js/orders.js') }}"></script>
{% endblock %}
